name: Build Android APK

on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Replace package name
        run: |
          PKG="${{ github.event.client_payload.packageName }}"
          OLD_PKG="com.example.webtoapp"
          PKG_PATH="${PKG//.//}"
          find android-template -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" \) \
            -exec sed -i "s|${OLD_PKG}|${PKG}|g" {} +
          mkdir -p "android-template/app/src/main/java/${PKG_PATH}"
          cp android-template/app/src/main/java/com/example/webtoapp/*.java \
             "android-template/app/src/main/java/${PKG_PATH}/"
          rm -rf android-template/app/src/main/java/com

      - name: Replace placeholders
        run: |
          APP="${{ github.event.client_payload.appName }}"
          URL="${{ github.event.client_payload.url }}"
          COLOR="${{ github.event.client_payload.primaryColor }}"
          find android-template -type f \( -name "*.xml" -o -name "*.java" \) \
            -exec sed -i "s|{{APP_NAME}}|${APP}|g" {} +
          find android-template -type f -name "*.java" \
            -exec sed -i "s|{{WEBSITE_URL}}|${URL}|g" {} +
          find android-template -type f -name "*.xml" \
            -exec sed -i "s|{{PRIMARY_COLOR}}|${COLOR}|g" {} +
          find android-template -type f -name "*.java" \
            -exec sed -i 's|{{CUSTOM_JS}}||g' {} +

      - name: Remove unused permissions
        run: |
          PERMS="${{ github.event.client_payload.permissions }}"
          for perm in camera storage location notifications; do
            if [[ "$PERMS" != *"$perm"* ]]; then
              UPPER=$(echo $perm | tr '[:lower:]' '[:upper:]')
              sed -i "/<!-- PERMISSION_${UPPER} -->/,/<!-- END_PERMISSION_${UPPER} -->/d" \
                android-template/app/src/main/AndroidManifest.xml
            fi
          done

      - name: Download app icon
        if: ${{ github.event.client_payload.iconUrl != '' }}
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            wget -q -O "android-template/app/src/main/res/mipmap-${density}/ic_launcher.png" \
              "${{ github.event.client_payload.iconUrl }}" || true
            cp "android-template/app/src/main/res/mipmap-${density}/ic_launcher.png" \
               "android-template/app/src/main/res/mipmap-${density}/ic_launcher_round.png" || true
          done

      - name: Download splash screen
        if: ${{ github.event.client_payload.splashUrl != '' }}
        run: |
          wget -q -O "android-template/app/src/main/res/drawable/splash.png" \
            "${{ github.event.client_payload.splashUrl }}" || true

      - name: Setup Gradle wrapper
        run: |
          cd android-template
          # Use gradle wrapper plugin to generate wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          # Download gradle-wrapper.jar
          curl -sL "https://github.com/nicowillis/gradle-wrapper-jar/raw/main/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          wget -q "https://raw.githubusercontent.com/nicowillis/gradle-wrapper-jar/main/gradle-wrapper.jar" \
            -O gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
          # If download fails, use gradle directly
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Using system gradle"
            gradle wrapper --gradle-version 8.2 || true
          fi
          chmod +x gradlew

      - name: Build APK with Gradle
        run: |
          cd android-template
          if [ -s gradle/wrapper/gradle-wrapper.jar ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace 2>&1
          else
            # Fallback: install gradle manually
            wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/
            /tmp/gradle-8.2/bin/gradle assembleRelease --no-daemon --stacktrace 2>&1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-output
          path: android-template/app/build/outputs/apk/release/*.apk
          retention-days: 7
          if-no-files-found: warn
