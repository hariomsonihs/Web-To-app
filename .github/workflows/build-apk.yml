name: Build Android APK

on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-template/**/*.gradle') }}
          restore-keys: gradle-

      - name: Parse config
        run: |
          CONFIG='${{ github.event.client_payload.config }}'
          echo "PERMISSIONS=$(echo $CONFIG | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('permissions','internet'))")" >> $GITHUB_ENV
          echo "PUSH_NOTIF=$(echo $CONFIG | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('pushNotifications','false'))")" >> $GITHUB_ENV
          echo "ADMOB=$(echo $CONFIG | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('admob','false'))")" >> $GITHUB_ENV

      - name: Replace package name
        run: |
          PKG="${{ github.event.client_payload.packageName }}"
          PKG_PATH="${PKG//.//}"
          find android-template -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" \) \
            -exec sed -i "s|{{PACKAGE_NAME}}|${PKG}|g" {} +
          find android-template -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" \) \
            -exec sed -i "s|com\.example\.webtoapp|${PKG}|g" {} +
          mkdir -p "android-template/app/src/main/java/${PKG_PATH}"
          cp android-template/app/src/main/java/com/example/webtoapp/*.java \
             "android-template/app/src/main/java/${PKG_PATH}/"
          rm -rf android-template/app/src/main/java/com

      - name: Replace placeholders
        run: |
          APP="${{ github.event.client_payload.appName }}"
          URL="${{ github.event.client_payload.url }}"
          COLOR="${{ github.event.client_payload.primaryColor }}"
          find android-template -type f \( -name "*.xml" -o -name "*.java" \) \
            -exec sed -i "s|{{APP_NAME}}|${APP}|g" {} +
          find android-template -type f -name "*.java" \
            -exec sed -i "s|{{WEBSITE_URL}}|${URL}|g" {} +
          find android-template -type f -name "*.xml" \
            -exec sed -i "s|{{PRIMARY_COLOR}}|${COLOR}|g" {} +
          find android-template -type f -name "*.java" \
            -exec sed -i 's|{{CUSTOM_JS}}||g' {} +

      - name: Remove unused permissions
        run: |
          PERMS="${PERMISSIONS}"
          for perm in camera storage location notifications; do
            if [[ "$PERMS" != *"$perm"* ]]; then
              UPPER=$(echo $perm | tr '[:lower:]' '[:upper:]')
              sed -i "/<!-- PERMISSION_${UPPER} -->/,/<!-- END_PERMISSION_${UPPER} -->/d" \
                android-template/app/src/main/AndroidManifest.xml
            fi
          done

      - name: Download custom icon
        if: ${{ github.event.client_payload.iconUrl != '' }}
        run: |
          ICON_URL="${{ github.event.client_payload.iconUrl }}"
          echo "Downloading icon from: $ICON_URL"
          # Install Pillow first
          pip install Pillow -q
          # Download
          wget -q -O /tmp/icon_original "$ICON_URL" || curl -sL "$ICON_URL" -o /tmp/icon_original
          # Check file type
          file /tmp/icon_original
          ls -la /tmp/icon_original
          # Convert to valid PNG for each density
          declare -A SIZES=([mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192)
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            size=${SIZES[$density]}
            DIR="android-template/app/src/main/res/mipmap-${density}"
            python3 -c "
from PIL import Image
import sys
try:
    img = Image.open('/tmp/icon_original').convert('RGBA')
    img = img.resize(($size, $size), Image.LANCZOS)
    # Convert to RGB (no alpha for PNG compatibility)
    bg = Image.new('RGB', img.size, (255,255,255))
    bg.paste(img, mask=img.split()[3])
    bg.save('$DIR/ic_launcher.png', 'PNG')
    print('Saved $DIR/ic_launcher.png')
except Exception as e:
    print('Error:', e)
    # Fallback to default icon
    from PIL import ImageDraw
    img = Image.new('RGB', ($size, $size), (102, 126, 234))
    img.save('$DIR/ic_launcher.png', 'PNG')
"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"
            echo "Done: $DIR/ic_launcher.png"
          done

      - name: Download splash screen
        if: ${{ github.event.client_payload.splashUrl != '' }}
        run: |
          wget -q -O "android-template/app/src/main/res/drawable/splash.png" \
            "${{ github.event.client_payload.splashUrl }}" || true

      - name: Setup Gradle wrapper
        run: |
          cd android-template
          mkdir -p gradle/wrapper
          wget -q "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -O gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version=8.2 --distribution-type=bin
          fi
          chmod +x gradlew

      - name: Build APK
        run: |
          cd android-template
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-output
          path: android-template/app/build/outputs/apk/release/*.apk
          retention-days: 7
          if-no-files-found: warn
