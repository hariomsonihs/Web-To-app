name: Build Android APK

on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Parse config
        run: |
          echo "BUILD_ID=${{ github.event.client_payload.buildId }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.appName }}" >> $GITHUB_ENV
          echo "PACKAGE_NAME=${{ github.event.client_payload.packageName }}" >> $GITHUB_ENV
          echo "WEBSITE_URL=${{ github.event.client_payload.url }}" >> $GITHUB_ENV
          echo "THEME=${{ github.event.client_payload.theme }}" >> $GITHUB_ENV
          echo "PRIMARY_COLOR=${{ github.event.client_payload.primaryColor }}" >> $GITHUB_ENV
          echo "ICON_URL=${{ github.event.client_payload.iconUrl }}" >> $GITHUB_ENV
          echo "SPLASH_URL=${{ github.event.client_payload.splashUrl }}" >> $GITHUB_ENV
          echo "BUILD_TYPE=${{ github.event.client_payload.buildType }}" >> $GITHUB_ENV
          # Parse nested config JSON
          CONFIG='${{ github.event.client_payload.config }}'
          echo "PERMISSIONS=$(echo $CONFIG | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('permissions','internet'))")" >> $GITHUB_ENV
          echo "PUSH_NOTIF=$(echo $CONFIG | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('pushNotifications','false'))")" >> $GITHUB_ENV
          echo "ADMOB=$(echo $CONFIG | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('admob','false'))")" >> $GITHUB_ENV

      - name: Replace package name
        run: |
          PKG="${{ github.event.client_payload.packageName }}"
          OLD_PKG="com.example.webtoapp"
          PKG_PATH="${PKG//.//}"
          # Replace placeholder AND old package name in all files
          find android-template -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" \) \
            -exec sed -i "s|{{PACKAGE_NAME}}|${PKG}|g" {} +
          find android-template -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" \) \
            -exec sed -i "s|${OLD_PKG}|${PKG}|g" {} +
          # Move Java files to correct package directory
          mkdir -p "android-template/app/src/main/java/${PKG_PATH}"
          cp android-template/app/src/main/java/com/example/webtoapp/*.java \
             "android-template/app/src/main/java/${PKG_PATH}/"
          rm -rf android-template/app/src/main/java/com

      - name: Replace placeholders
        run: |
          APP="${{ github.event.client_payload.appName }}"
          URL="${{ github.event.client_payload.url }}"
          COLOR="${{ github.event.client_payload.primaryColor }}"
          find android-template -type f \( -name "*.xml" -o -name "*.java" \) \
            -exec sed -i "s|{{APP_NAME}}|${APP}|g" {} +
          find android-template -type f -name "*.java" \
            -exec sed -i "s|{{WEBSITE_URL}}|${URL}|g" {} +
          find android-template -type f -name "*.xml" \
            -exec sed -i "s|{{PRIMARY_COLOR}}|${COLOR}|g" {} +
          find android-template -type f -name "*.java" \
            -exec sed -i 's|{{CUSTOM_JS}}||g' {} +

      - name: Remove unused permissions
        run: |
          PERMS="${PERMISSIONS}"
          for perm in camera storage location notifications; do
            if [[ "$PERMS" != *"$perm"* ]]; then
              UPPER=$(echo $perm | tr '[:lower:]' '[:upper:]')
              sed -i "/<!-- PERMISSION_${UPPER} -->/,/<!-- END_PERMISSION_${UPPER} -->/d" \
                android-template/app/src/main/AndroidManifest.xml
            fi
          done

      - name: Download app icon
        if: ${{ github.event.client_payload.iconUrl != '' }}
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            wget -q -O "android-template/app/src/main/res/mipmap-${density}/ic_launcher.png" \
              "${{ github.event.client_payload.iconUrl }}" || true
            cp "android-template/app/src/main/res/mipmap-${density}/ic_launcher.png" \
               "android-template/app/src/main/res/mipmap-${density}/ic_launcher_round.png" || true
          done

      - name: Download splash screen
        if: ${{ github.event.client_payload.splashUrl != '' }}
        run: |
          wget -q -O "android-template/app/src/main/res/drawable/splash.png" \
            "${{ github.event.client_payload.splashUrl }}" || true

      - name: Setup Gradle wrapper jar
        run: |
          cd android-template
          mkdir -p gradle/wrapper
          # Download official gradle wrapper jar
          wget -q "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -O gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          curl -sL "https://search.maven.org/remotecontent?filepath=org/gradle/gradle-wrapper/8.2/gradle-wrapper-8.2.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
          # Fallback: generate via gradle command
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version=8.2 --distribution-type=bin
          fi
          chmod +x gradlew

      - name: Build APK
        run: |
          cd android-template
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-output
          path: android-template/app/build/outputs/apk/release/*.apk
          retention-days: 7
          if-no-files-found: warn
